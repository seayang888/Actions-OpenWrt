name: Build ImmortalWrt AX3000T

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3 python3-pip python3-distutils rsync unzip zlib1g-dev file wget qemu-utils

      - name: Clone Source Code
        run: |
          git clone https://github.com/seayang888/immortalwrt.git immortalwrt
          cd immortalwrt
          git checkout master

      - name: Update Feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load Custom Config
        run: |
          cd immortalwrt
          rm -f .config
          cp ../.config .config

      - name: Download Dependencies
        run: |
          cd immortalwrt
          make defconfig
          make download -j$(nproc)

      - name: Build Firmware
        run: |
          cd immortalwrt
          make -j$(nproc) V=s

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-ax3000t
          path: immortalwrt/bin/targets/mediatek/filogic/*.bin
