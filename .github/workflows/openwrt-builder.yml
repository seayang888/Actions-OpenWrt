name: Build ImmortalWrt for AX3000T

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget -y

      # 👇 【关键修复】加上克隆源码的步骤！
      - name: Clone ImmortalWrt source
        run: |
          git clone https://github.com/seayang888/immortalwrt.git immortalwrt
          cd immortalwrt
          git checkout master  # 或者你用的分支

      - name: Load custom config
        run: |
          cd immortalwrt
          rm -f .config
          cp ../.config .config  # 你的 .config 必须在仓库根目录

      - name: Make oldconfig
        run: |
          cd immortalwrt
          make oldconfig

      - name: Download dependencies
        run: |
          cd immortalwrt
          make download -j$(nproc)

      - name: Compile firmware
        run: |
          cd immortalwrt
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-ax3000t
          path: immortalwrt/bin/targets/mediatek/filogic/*sysupgrade*
